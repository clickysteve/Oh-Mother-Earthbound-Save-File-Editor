name: Release Windows .exe

# Builds an unsigned Windows .exe of the editor.
#
# Triggers:
#   - Push of a tag matching v* (e.g. v1.0.0)  →  builds + creates a
#     GitHub Release with the .exe attached.
#   - Manual "Run workflow"                    →  builds + uploads the
#     .exe as a workflow artifact (no Release).
#
# Notes:
#   - The .exe is unsigned, so first-run users will see a SmartScreen
#     warning ("Windows protected your PC") and have to click
#     "More info" → "Run anyway".
#   - PyInstaller can't cross-compile, which is why this lives on a
#     windows-latest runner instead of being part of build_mac_app.sh.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release

jobs:
  build-windows:
    name: Build unsigned Windows .exe
    runs-on: windows-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pillow

      - name: Generate AppIcon.ico from source PNG (if available)
        shell: bash
        run: |
          python - <<'PY'
          # Generate a multi-resolution Windows .ico from whatever icon
          # source PNG we can find in the repo. If none is found we just
          # build without a custom icon — the .exe will use Python's
          # default launcher icon.
          import os
          from PIL import Image

          if os.path.isfile('AppIcon.ico'):
              print('AppIcon.ico already present in repo; using it as-is.')
              raise SystemExit(0)

          candidates = [
              'icon-source.png',
              'assets/icon-source.png',
              'assets/icon.png',
              '_local/icon-source.png',  # gitignored, but covers local runs
          ]
          src = next((p for p in candidates if os.path.isfile(p)), None)
          if not src:
              print('No icon source found; building without a custom icon.')
              raise SystemExit(0)

          im = Image.open(src).convert('RGBA')

          # Pad to square so the icon doesn't get stretched horizontally.
          w, h = im.size
          if w != h:
              side = max(w, h)
              padded = Image.new('RGBA', (side, side), (0, 0, 0, 0))
              padded.paste(im, ((side - w) // 2, (side - h) // 2))
              im = padded

          sizes = [(16, 16), (32, 32), (48, 48), (64, 64),
                   (128, 128), (256, 256)]
          im.save('AppIcon.ico', sizes=sizes)
          print(f'Generated AppIcon.ico from {src} (sizes: {sizes})')
          PY

      - name: Build .exe with PyInstaller
        shell: bash
        run: |
          ICON_OPT=""
          if [[ -f AppIcon.ico ]]; then
              ICON_OPT="--icon=AppIcon.ico"
              echo "    using AppIcon.ico"
          else
              echo "    no AppIcon.ico — using PyInstaller default icon"
          fi
          # --windowed   : suppress the Windows console window
          # --onefile    : produce a single self-contained .exe
          # --noconfirm  : overwrite existing dist/ without prompting
          # --clean      : discard any cached PyInstaller artefacts
          python -m PyInstaller \
              --noconfirm --clean --windowed --onefile \
              --name "Oh Mother" \
              $ICON_OPT \
              eb_save_gui.py

      - name: Upload .exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: oh-mother-windows
          path: dist/Oh Mother.exe
          if-no-files-found: error

      - name: Attach .exe to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Oh Mother.exe
          draft: false
          generate_release_notes: true
